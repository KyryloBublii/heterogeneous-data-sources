spring.datasource.url=jdbc:h2:mem:testdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_UPPER=false
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.defer-datasource-initialization=true

spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

spring.task.execution.pool.core-size=0
spring.task.execution.pool.max-size=1
spring.task.execution.pool.queue-capacity=0
spring.task.scheduling.pool.size=0

data.storage.root=build/test-storage


security.jwt.issuer=test-issuer

logging.level.root=WARN
logging.level.org.example=INFO
logging.level.org.springframework.web=INFO
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

spring.web.resources.add-mappings=false

spring.jackson.serialization.fail-on-empty-beans=false
spring.jackson.default-property-inclusion=non_null

spring.jmx.enabled=false
spring.main.lazy-initialization=false

spring.main.banner-mode=off
spring.h2.console.enabled=false
